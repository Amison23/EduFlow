name: eduflow
description: EduFlow - Lifeline Learning for Africa's Displaced

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking
  dio: ^5.3.3
  connectivity_plus: ^5.0.2

  # Local storage
  sqflite: ^2.3.0
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  path: ^1.8.3

  # Audio
  audioplayers: ^5.2.1

  # Utilities
  uuid: ^4.2.1
  crypto: ^3.0.3
  intl: ^0.20.2

  # UI
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.5.4
  flutter_dotenv: ^5.1.0
  flutter_markdown: ^0.7.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/audio/
    - assets/images/
    - assets/lesson_packs/math_level1.json
    - assets/lesson_packs/english_level1.json
    - ml_models/
    - .env

