services:
  - type: web
    name: eduflow-api
    env: node
    numInstances: 1
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: "production"
      - key: SUPABASE_URL
        value: "https://your-project.supabase.co"
      - key: SUPABASE_SERVICE_KEY
        value: "YOUR_SUPABASE_SERVICE_KEY"
      - key: SUPABASE_ANON_KEY
        value: "YOUR_SUPABASE_ANON_KEY"
      - key: JWT_SECRET
        value: "YOUR_JWT_SECRET"
      - key: AFRICA_TALKING_API_KEY
        value: "YOUR_AFRICA_TALKING_API_KEY"
      - key: AFRICA_TALKING_USERNAME
        value: "sandbox"
      - key: SMS_SHORTCODE
        value: "33528"
